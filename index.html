<body>

<!-- TON HTML RESTE IDENTIQUE -->
<!-- (Je ne le réécris pas ici pour ne pas exploser la taille, garde ton HTML actuel tel quel) -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<script>
/* ============================= */
/* NOUVELLES AMÉLIORATIONS      */
/* ============================= */

const OBJECTIVE_WEIGHT = 62; // ← Modifie ici ton objectif

let chartWeight = null;
let chartChecks = null;

/* ============================= */
/* AUTO SAVE POIDS              */
/* ============================= */

function enableAutoSave() {
  const input = document.getElementById('weight-input');
  if (!input) return;

  let timeout;
  input.addEventListener('input', () => {
    clearTimeout(timeout);
    timeout = setTimeout(() => {
      saveToday();
      toast('✔ Auto-sauvegardé');
    }, 1000);
  });
}

/* ============================= */
/* MOYENNE MOBILE               */
/* ============================= */

function movingAverage(data, period = 7) {
  return data.map((_, i, arr) => {
    const start = Math.max(0, i - (period - 1));
    const subset = arr.slice(start, i + 1);
    return (subset.reduce((a,b)=>a+b,0)/subset.length).toFixed(2);
  });
}

/* ============================= */
/* SCORE + STREAK               */
/* ============================= */

function calculateWeeklyStats() {
  const days = getAllDays();
  const last7 = days.slice(-7);

  let avgScore = 0;
  if (last7.length > 0) {
    avgScore = Math.round(
      last7.reduce((acc, d) => {
        if (!d.checks) return acc;
        return acc + (d.checks.filter(Boolean).length / 5) * 100;
      }, 0) / last7.length
    );
  }

  let streak = 0;
  const reversed = [...days].reverse();

  for (let d of reversed) {
    if (!d.checks) break;
    if (d.checks.filter(Boolean).length >= 4) streak++;
    else break;
  }

  return { avgScore, streak };
}

/* ============================= */
/* COURBE AMÉLIORÉE             */
/* ============================= */

function renderCourbe() {

  const days = getAllDays().filter(d => d.weight);

  const statsRow = document.getElementById('stats-row');
  statsRow.innerHTML = `
    <div class="stat-card"><div class="val" id="stat-start">—</div><div class="lbl">Départ</div></div>
    <div class="stat-card"><div class="val good" id="stat-current">—</div><div class="lbl">Actuel</div></div>
    <div class="stat-card"><div class="val accent" id="stat-diff">—</div><div class="lbl">Perdu</div></div>
  `;

  if (days.length > 0) {
    const first = days[0].weight;
    const last = days[days.length-1].weight;
    const diff = (last - first).toFixed(1);

    document.getElementById('stat-start').textContent = first + ' kg';
    document.getElementById('stat-current').textContent = last + ' kg';

    const diffEl = document.getElementById('stat-diff');
    diffEl.textContent = (diff <= 0 ? '' : '+') + diff + ' kg';
    diffEl.className = 'val ' + (diff <= 0 ? 'good' : 'accent');
  }

  const weekly = calculateWeeklyStats();

  statsRow.innerHTML += `
    <div class="stat-card"><div class="val">${weekly.avgScore}%</div><div class="lbl">Score 7j</div></div>
    <div class="stat-card"><div class="val">🔥 ${weekly.streak}</div><div class="lbl">Streak</div></div>
  `;

  const container = document.getElementById('chart-container');

  if (days.length < 2) {
    container.innerHTML = '<div class="no-data"><span class="icon">📊</span>Il faut au moins 2 pesées.</div>';
    return;
  }

  container.innerHTML = '<canvas id="weight-chart"></canvas>';
  if (chartWeight) chartWeight.destroy();

  const labels = days.map(d => {
    const dt = new Date(d.date);
    return dt.toLocaleDateString('fr-FR',{day:'numeric',month:'short'});
  });

  const weights = days.map(d => d.weight);
  const avg7 = movingAverage(weights);

  const ctx = document.getElementById('weight-chart').getContext('2d');

  chartWeight = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label:'Poids',
          data:weights,
          borderColor:'#40916C',
          backgroundColor:'rgba(64,145,108,0.1)',
          tension:0.3,
          fill:true
        },
        {
          label:'Moyenne 7j',
          data:avg7,
          borderColor:'#1B4332',
          borderDash:[6,4],
          tension:0.4,
          fill:false
        },
        {
          label:'Objectif',
          data:new Array(weights.length).fill(OBJECTIVE_WEIGHT),
          borderColor:'#e76f51',
          borderWidth:2,
          pointRadius:0
        }
      ]
    },
    options:{
      responsive:true,
      plugins:{ legend:{ display:true }},
      scales:{
        y:{ ticks:{ callback:v=>v+' kg' }}
      }
    }
  });
}

/* ============================= */
/* INIT MODIFIÉ                 */
/* ============================= */

const originalRenderToday = renderToday;
renderToday = function() {
  originalRenderToday();
  enableAutoSave();
};

</script>

</body>
