<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#000000"/>
<title>FitMeal Elite 12 Semaines</title>

<style>
:root{
  --bg:#f2f2f7;
  --card:#ffffff;
  --text:#111;
  --accent:#111;
  --green:#30D158;
  --red:#ff3b30;
}

@media (prefers-color-scheme: dark){
  :root{
    --bg:#000;
    --card:#1c1c1e;
    --text:#fff;
    --accent:#fff;
  }
}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg);
  color:var(--text);
  padding:20px;
}

h1{
  font-size:22px;
  margin-bottom:10px;
}

.card{
  background:var(--card);
  padding:18px;
  border-radius:20px;
  margin-bottom:16px;
  box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid #ccc;
  margin-top:8px;
  font-size:16px;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  font-size:16px;
  font-weight:600;
  background:var(--accent);
  color:var(--bg);
  margin-top:10px;
}

.macro-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.macro-card{
  background:var(--card);
  padding:12px;
  border-radius:14px;
  text-align:center;
  font-weight:600;
}

.progress{
  height:10px;
  background:#ddd;
  border-radius:10px;
  overflow:hidden;
  margin-top:10px;
}

.progress-bar{
  height:100%;
  width:0%;
  background:var(--green);
  transition:0.4s;
}

.small{
  font-size:14px;
  opacity:0.7;
}

canvas{
  width:100%;
  max-width:100%;
  margin-top:20px;
}
</style>
</head>
<body>

<h1>🔥 FitMeal Elite 12 Semaines</h1>

<div class="card">
  <label>Poids actuel (kg)</label>
  <input type="number" id="weightInput" placeholder="Ex: 68">
  <button onclick="updatePlan()">Mettre à jour le plan</button>
</div>

<div class="card">
  <div class="macro-grid">
    <div class="macro-card">Calories<br><span id="calories">-</span></div>
    <div class="macro-card">Protéines<br><span id="protein">-</span></div>
    <div class="macro-card">Glucides<br><span id="carbs">-</span></div>
    <div class="macro-card">Lipides<br><span id="fats">-</span></div>
  </div>
</div>

<div class="card">
  <div>Progression vers objectif calorique</div>
  <div class="progress">
    <div class="progress-bar" id="progressBar"></div>
  </div>
  <div class="small" id="projection"></div>
</div>

<div class="card">
  <canvas id="weightChart"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
//══════════════════════════════════
// CONFIGURATION 12 SEMAINES
//══════════════════════════════════

const targetLossKg = 5; // Objectif -5kg
const weeklyLossKg = 0.7; // Perte estimée/semaine
const weeks = 12;

let weightHistory = JSON.parse(localStorage.getItem("weightHistory")) || [];

function estimateMaintenance(weight){
  return Math.round(weight * 22 * 1.5);
}

function calculateCut(weight){
  let maintenance = estimateMaintenance(weight);
  
  // Ajustement si stagnation
  if(weightHistory.length>=2){
    const last = weightHistory[weightHistory.length-1];
    const prev = weightHistory[weightHistory.length-2];
    if(last.weight >= prev.weight){ 
      maintenance -= 150; 
    }
  }
  return maintenance - 650;
}

function updatePlan(){
  const weight = parseFloat(document.getElementById("weightInput").value);
  if(!weight) return;

  const calories = calculateCut(weight);
  const protein = Math.round(weight * 2.2);
  const fats = Math.round(weight * 0.8);
  const carbs = Math.round((calories - (protein*4 + fats*9)) / 4);

  document.getElementById("calories").innerText = calories + " kcal";
  document.getElementById("protein").innerText = protein + " g";
  document.getElementById("carbs").innerText = carbs + " g";
  document.getElementById("fats").innerText = fats + " g";

  // Stocker le poids actuel
  const today = new Date().toISOString().split('T')[0];
  weightHistory.push({date: today, weight: weight});
  if(weightHistory.length>84) weightHistory.shift(); // max 12 semaines * 7 jours
  localStorage.setItem("weightHistory", JSON.stringify(weightHistory));

  updateProjection(weight, calories);
  updateChart();
}

function updateProjection(weight, calories){
  const weeksToTarget = Math.ceil((weight - (weight - targetLossKg)) / weeklyLossKg);
  const targetDate = new Date();
  targetDate.setDate(targetDate.getDate() + (weeksToTarget * 7));

  document.getElementById("projection").innerText =
    "🎯 -0,7kg/semaine estimé | Objectif -5kg atteint vers : " +
    targetDate.toLocaleDateString();

  const progressPercent = Math.min(100, (weightHistory[weightHistory.length-1].weight - (weight - targetLossKg)) / targetLossKg * 100);
  document.getElementById("progressBar").style.width = progressPercent + "%";
}

//══════════════════════════════════
// GRAPHIQUE POIDS 12 SEMAINES
//══════════════════════════════════

const ctx = document.getElementById('weightChart').getContext('2d');
const chart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: weightHistory.map(w=>w.date),
    datasets: [{
      label: 'Poids (kg)',
      data: weightHistory.map(w=>w.weight),
      borderColor: '#30D158',
      backgroundColor: 'rgba(48, 209, 88, 0.2)',
      tension: 0.3,
      fill:true
    }]
  },
  options:{
    responsive:true,
    plugins:{
      legend:{display:true},
    },
    scales:{
      y:{beginAtZero:false}
    }
  }
});

function updateChart(){
  chart.data.labels = weightHistory.map(w=>w.date);
  chart.data.datasets[0].data = weightHistory.map(w=>w.weight);
  chart.update();
}

// Charger ancien poids
if(weightHistory.length>0){
  document.getElementById("weightInput").value = weightHistory[weightHistory.length-1].weight;
  updatePlan();
}
</script>

</body>
</html>
